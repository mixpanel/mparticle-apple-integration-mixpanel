name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Show Xcode version
      run: xcodebuild -version
    - name: Resolve Swift Package Dependencies
      run: swift package resolve
    - name: Find simulator
      id: sim
      run: |
        DEST=$(xcrun simctl list devices available -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
                for d in devices:
                    if d.get('isAvailable'):
                        print(f\"platform=iOS Simulator,id={d['udid']}\")
                        sys.exit(0)
        sys.exit(1)
        ")
        echo "dest=$DEST" >> $GITHUB_OUTPUT
        echo "Using simulator: $DEST"
    - name: Build for iOS Simulator
      run: |
        xcodebuild build \
          -scheme mParticle-Mixpanel \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_ALLOWED='NO'
    - name: Run tests for iOS Simulator
      run: |
        xcodebuild test \
          -scheme mParticle-Mixpanel \
          -destination '${{ steps.sim.outputs.dest }}' \
          -enableCodeCoverage YES \
          CODE_SIGNING_ALLOWED='NO'

  pod-lint:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: CocoaPods Lint
      run: pod lib lint mParticle-Mixpanel.podspec --allow-warnings
